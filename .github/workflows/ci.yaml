name: CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip2
          components: rustfmt, clippy

      - name: Check formatting
        run: cargo fmt --check

      - name: Lint
        run: cargo clippy --target wasm32-wasip2 -- -D warnings

      - name: Build
        run: cargo build --target wasm32-wasip2

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Install Node.js dependencies
        run: npm ci

      - name: Test version update logic
        run: npm test

  grammar:
    name: Grammar Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install tree-sitter-cli
        run: npm install -g tree-sitter-cli

      - name: Install Bicep grammar dependencies
        run: cd grammars/bicep && npm install

      - name: Test Bicep Grammar
        run: cd grammars/bicep && tree-sitter test

      - name: Install Bicep Params grammar dependencies
        run: cd grammars/bicep_params && npm install

      - name: Test Bicep Params Grammar
        run: cd grammars/bicep_params && tree-sitter test

  commit-lint:
    name: Conventional Commits
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check PR title
        uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
