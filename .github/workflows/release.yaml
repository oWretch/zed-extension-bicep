name: Release
on:
  push:
    branches:
      - main
    paths-ignore: # Don't trigger on releases
      - Cargo.toml
      - extension.toml
      - package.json
      - package-lock.json

permissions:
  contents: read

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Release
        id: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release

      - name: Publish extension
        uses: oWretch/zed-extension-action@46431e104acab5f5c7e88bab21dd03c62398b6a2 # default branch head (no releases/tags)
        with:
          extension-name: bicep
          push-to: oWretch/zed-extensions
          tag: v${{ steps.release.outputs.ReleaseVersion }}
        env:
          COMMITTER_TOKEN: ${{ secrets.EXTENSION_PUBLISH_TOKEN }}
